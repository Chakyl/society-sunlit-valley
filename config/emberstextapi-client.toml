
[messages]
	#Master toggle for immersive messages sent via commands/API.
	immersiveMessagesEnabled = true
	#Client cap on immersive message duration in ticks. 0 = unlimited.
	#Range: > 0
	maxMessageDuration = 0
	#Client cap on simultaneous active messages. 0 = unlimited.
	#Range: > 0
	maxActiveMessages = 0
	#Client cap on pending steps per queue channel. 0 = unlimited.
	#Range: 0 ~ 1000
	maxQueueSize = 50

[effects]
	#Disable all motion-category effects (wave, bounce, shake...). Accessibility.
	reduceMotion = false
	#Per-effect render overrides, entries like "glitch=false". Overrides perCategory.
	perEffect = []
	#Per-category render overrides, entries like "DISTORTION=false".
	perCategory = []
	#Caps neon/glow quality. 1=fast, 2=balanced, 3=quality.
	#Range: 1 ~ 3
	maxNeonQuality = 3

[rendering]
	#Master toggle for SDF font rendering.
	sdfEnabled = true
	#Max entries in the text layout LRU cache.
	#Range: 64 ~ 2048
	textLayoutCacheSize = 256

[internal]
	#Config schema version. Do not edit.
	#Range: > 0
	schemaVersion = 1

